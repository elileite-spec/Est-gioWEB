<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Pesquisa de Hobbies</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Pesquisa de Hobbies</h1>

    <form>

        <label for="nome">Seu nome:</label>
        <br>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
        <br><br>

        <label for="idade">Sua idade:</label>
        <br>
        <input type="number" id="idade" name="idade">
        <br><br>

        <p>Quais hobbies você gosta?</p>

        <input type="checkbox" id="jogos" name="hobby">
        <label for="jogos">Jogos</label>
        <br>

        <input type="checkbox" id="musica" name="hobby">
        <label for="musica">Ouvir música</label>
        <br>

        <input type="checkbox" id="esporte" name="hobby">
        <label for="esporte">Esportes</label>
        <br>

        <input type="checkbox" id="filmes" name="hobby">
        <label for="filmes">Assistir filmes</label>
        <br><br>

        <p>Você prefere fazer hobbies:</p>

        <input type="radio" id="sozinho" name="preferencia">
        <label for="sozinho">Sozinho</label>
        <br>

        <input type="radio" id="amigos" name="preferencia">
        <label for="amigos">Com amigos</label>
        <br><br>

        <label for="tempo">Tempo livre por dia:</label>
        <br>

        <select id="tempo" name="tempo">
            <option>30 minutos</option>
            <option>1 hora</option>
            <option>2 horas</option>
            <option>Mais de 3 horas</option>
        </select>

        <br><br>

        <button type="submit">Enviar</button>

    </form>

</body>

</html>
