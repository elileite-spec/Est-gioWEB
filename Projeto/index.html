<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle de Treinos</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
  <h1>🏋️ Controle de Treinos</h1>

  <input type="text" id="nome" placeholder="Ex: Agachamento">
  
  <select id="grupo">
    <option value="">Grupo muscular</option>
    <option>Perna</option>
    <option>Peito</option>
    <option>Costas</option>
    <option>Braço</option>
    <option>Ombro</option>
  </select>

  <input type="number" id="dificuldade" placeholder="Dificuldade (1 a 5)" min="1" max="5">

  <button id="btnAdicionar">Adicionar</button>

  <label>
    <input type="checkbox" id="filtro">
    Mostrar só feitos hoje
  </label>

  <p>Total: <span id="total">0</span></p>
  <ul id="lista"></ul>
  <button id="btnLimpar">Limpar lista</button>
</div>

<script src="script.js"></script>
</body>
</html>
